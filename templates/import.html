{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-10 rounded-3xl shadow-sm border border-purple-50 text-center">
    <div class="mb-6">
        <div class="w-20 h-20 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-file-csv text-3xl text-purple-400"></i>
        </div>
        <h2 class="brand-font text-3xl text-gray-800">Müşteri Listesini Aktar</h2>
        <p class="text-gray-400 mt-2 italic text-sm">Sistem, listenizdeki tekrarlanan e-posta adreslerini otomatik olarak ayıklar.</p>
    </div>

    <form action="/import-contacts" method="POST" enctype="multipart/form-data" class="space-y-6">
        <div class="border-2 border-dashed border-purple-100 rounded-2xl p-10 hover:border-purple-300 transition-all bg-purple-50/30">
            <input type="file" name="file" accept=".csv" class="hidden" id="csvFile">
            <label for="csvFile" class="cursor-pointer">
                <span class="block text-purple-500 font-semibold mb-2">Dosyayı Seçin veya Sürükleyin</span>
                <span class="text-xs text-gray-400">Sadece .CSV formatı desteklenir (Sütunlar: name, email)</span>
            </label>
        </div>
        
        <button type="submit" class="w-full kite-bg-purple text-white py-4 rounded-xl font-bold shadow-lg hover:bg-purple-600 transition-all flex items-center justify-center gap-2">
            <i class="fas fa-upload"></i> Verileri KITE'a Yükle
        </button>
    </form>
    
    
</div>
{% endblock %}
